    <!-- Estructura Única del Modal -->
    <div id="newsModal" class="modal" onclick="closeModal(event)">

   <style>
       * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
  body{
  background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
        zoom:75%;
    font-family: 'Segoe UI', sans-serif; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
     }
        .title_0 {
      color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 3rem;
    text-align: center;
    margin-bottom: 40px;
  }

  .letra {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    animation: aparecer 0.3s forwards;
  }

  @keyframes aparecer {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .espacio {
    display: inline-block;
    width: 0.5em; /* ancho del espacio */
  }

        /* Galería */
        .premium-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .item {
            position: relative;
            border-radius: 20px;
            height: 350px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .item img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .item:hover img { transform: scale(1.1); filter: brightness(70%); }
/* EL EXTRA 1: El degradado de cristal que sube */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, transparent 50%);
    opacity: 0;
    transform: translateY(100%);
    transition: all 0.5s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 25px;
    box-sizing: border-box;
  }

  /* EL EXTRA 2: El brillo tipo "flash" al entrar */
  .item::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-25deg);
    transition: 0.5s;
    z-index: 2;
  }

  /* Animaciones al hacer Hover */
  .item:hover img { transform: scale(1.15) rotate(2deg); }
  
  .item:hover .overlay {
    opacity: 1;
    transform: translateY(0);
  }

  .item:hover::before { left: 125%; }
      /* Texto estilizado */
  .overlay h3 { color: white; margin: 0; font-family: sans-serif; font-size: 1.4rem; }
  .overlay p { color: #94a3b8; font-family: sans-serif; font-size: 0.9rem; margin: 5px 0 0; }

        /* Estilos del Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 800px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-img { width: 100%; height: 100%; object-fit: cover; min-height: 300px; }
        .modal-text { padding: 40px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: #64748b; }
        
        #modal-title { font-size: 2rem; margin: 0; color: #1e293b; }
        #modal-desc { color: #64748b; line-height: 1.6; margin-top: 15px; }

        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; } }
    </style>

    <script>
        function openModal(title, desc, imgSrc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('newsModal').style.display = 'flex';
        }

        function closeModal(event) {
            document.getElementById('newsModal').style.display = 'none';
        }
      //title-0
const titulo = document.getElementById("titulo");
  const texto = titulo.textContent;
  titulo.textContent = "";

  function animarTexto() {
    titulo.textContent = "";
    [...texto].forEach((caracter, i) => {
      if (caracter === " ") {
        const espacio = document.createElement("span");
        espacio.classList.add("espacio");
        titulo.appendChild(espacio);
      } else {
        const span = document.createElement("span");
        span.textContent = caracter;
        span.classList.add("letra");
        span.style.animationDelay = `${i * 0.1}s`;
        titulo.appendChild(span);
      }
    });
  }

  // Animar al inicio
  animarTexto();

  // Repetir automáticamente cada 5 segundos
  setInterval(animarTexto, 5000);
    </script>
