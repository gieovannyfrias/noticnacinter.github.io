  <body>
<section id="youtube-live" class="live-modern">
  <h2>🔴 Transmisión en Vivo</h2>
  <div class="live-container">
    <!-- Embed de YouTube Live -->
    <iframe 
      src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig" 
      title="YouTube Live" 
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
    <div class="live-info">
      <h3>🌍 Noticias en tiempo real</h3>
      <p>Sigue la transmisión en vivo con las últimas actualizaciones del día.</p>
      <span class="live-meta">En vivo · 24 Ene <span class="year"></span></span>
    </div>
  </div>
</section>
<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
  body{
  background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
        zoom:75%;
  }
.live-modern {
  padding: 40px 20px;
  background: #1e1e2f;
  border-radius: 16px;
  color: #fff;
  text-align: center;
}

.live-modern h2 {
  margin-bottom: 25px;
  font-size: 2rem;
  background: linear-gradient(90deg, #ff1e1e, #ffd700, #2575fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.live-container {
  background: #2a2a3d;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

.live-container iframe {
  width: 100%;
  height: 400px;
  border-radius: 12px;
}

.live-info {
  margin-top: 15px;
  text-align: left;
}

.live-info h3 {
  font-size: 1.4rem;
  margin: 0 0 8px;
}

.live-info p {
  font-size: 1rem;
  color: #ddd;
  margin-bottom: 10px;
}

.live-meta {
  font-size: 0.85rem;
  color: #aaa;
}

</style>
<script src="src/components/Header/header-alt.js" defer></script>
<script src="src/components/Footer/footer-alt.js" defer></script>

<script>
  // Obtener el año actual
const currentYear = new Date().getFullYear();

// Seleccionar todos los elementos con la clase "year"
const yearElements = document.querySelectorAll(".year");

// Insertar el año en cada uno
yearElements.forEach(el => {
  el.textContent = currentYear;
});
</script>
